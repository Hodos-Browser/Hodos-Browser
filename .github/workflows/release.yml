# Hodos Browser Release Workflow
# 
# Triggers when you push a version tag (e.g., v1.0.0)
# Builds installers for Windows (macOS coming later), signs them, publishes to GitHub Releases
#
# SETUP REQUIRED:
#
# 1. Upload CEF binaries to a GitHub Release:
#    - Create a release tagged "cef-binaries" in this repo
#    - Upload cef-binaries-windows.zip (your built-from-source Windows CEF)
#    - Later: upload cef-binaries-macos.zip
#
# 2. Add these secrets (GitHub org → Settings → Secrets):
#    Azure Trusted Signing (Windows):
#      - AZURE_TENANT_ID
#      - AZURE_CLIENT_ID  
#      - AZURE_CLIENT_SECRET
#
#    Apple (macOS - add later):
#      - MACOS_CERT_BASE64
#      - MACOS_CERT_PASSWORD
#      - APPLE_TEAM_ID
#      - APPLE_API_KEY_ID
#      - APPLE_API_ISSUER
#      - APPLE_API_KEY_P8_BASE64

name: Release

on:
  push:
    tags:
      - 'v*'  # Triggers on v1.0.0, v2.1.3, etc.

# Don't let a re-pushed tag race itself (two runs both creating/editing the same
# draft release). One build per tag at a time; never cancel an in-flight build.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  # Azure Artifact Signing config
  AZURE_SIGNING_ENDPOINT: https://wcus.codesigning.azure.net/
  AZURE_SIGNING_ACCOUNT: Hodos-Signing
  AZURE_SIGNING_PROFILE: Hodos-signing

jobs:
  # ============================================================
  # WINDOWS BUILD
  # ============================================================
  build-windows:
    # Pinned to windows-2022 (not windows-latest): the runner's "windows-latest"
    # label rolled forward to the windows-2025 image, where the
    # "Visual Studio 17 2022" CMake generator no longer resolves
    # ("could not find any instance of Visual Studio"). windows-2022 ships the
    # MSVC v143 toolset our prebuilt CEF + vcpkg static deps are built against.
    # Do NOT bump to a newer image without re-validating the whole C++/CEF stack
    # on the new toolset — see DevOps-CICD/CEF_VERSION_UPDATE_TRACKER.md.
    runs-on: windows-2022
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      # Get version from tag (strips 'v' prefix)
      - name: Get version from tag
        id: version
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          echo "Building version: $version"
          # Globally-monotonic build number — MUST stay byte-identical to the
          # build-macos "Get version from tag" formula and the appcast step
          # (sparkle:version), because the Windows auto-updater's integer
          # anti-rollback gate (commit 4) compares the feed's build-number
          # against the value baked into this build via -DAPP_BUILD_NUMBER:
          #   MAJOR*1000000 + MINOR*10000 + PATCH*100 + (beta N, or 99 for a final)
          $core = $version.Split('-')[0]
          $p = $core.Split('.')
          $maj = [int]$p[0]; $min = [int]$p[1]; $pat = [int]$p[2]
          if ($version -match '-beta\.([0-9]+)$') { $beta = [int]$Matches[1] } else { $beta = 99 }
          $buildNumber = $maj * 1000000 + $min * 10000 + $pat * 100 + $beta
          echo "BUILD_NUMBER=$buildNumber" >> $env:GITHUB_OUTPUT
          echo "Build number: $buildNumber"
      
      # Download CEF binaries from the cef-binaries release
      - name: Download CEF binaries
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download cef-binaries --pattern "cef-binaries-windows.zip" --repo ${{ github.repository }}

          echo "Extracting CEF binaries..."
          7z x cef-binaries-windows.zip -y
          del cef-binaries-windows.zip

          if (Test-Path "cef-binaries") {
            echo "CEF binaries extracted successfully"
            dir cef-binaries
          } else {
            echo "ERROR: cef-binaries folder not found after extraction"
            exit 1
          }
        shell: pwsh
      
      # Set up build tools
      # T3 Wave 3 (decision #8): msvc-dev-cmd@v1 runs on Node 20 and emits a
      # deprecation warning. We ACCEPT it — there is no Node-24 release, and
      # swapping risks the VS2022 v143 toolset on the pinned windows-2022 runner.
      # TRIPWIRE: re-check for a maintained Node-24 successor on/after 2026-09-16.
      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
      
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
      
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            rust-wallet
            adblock-engine
      
      # Install Inno Setup
      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
      
      # Install C++ dependencies via vcpkg
      - name: Install vcpkg dependencies
        shell: pwsh
        run: |
          vcpkg install nlohmann-json:x64-windows-static sqlite3:x64-windows-static

      # Download WinSparkle for auto-update support
      - name: Download WinSparkle
        shell: pwsh
        run: |
          New-Item -Path "external\winsparkle" -ItemType Directory -Force
          # 0.8.1: the WinSparkle.dll currently shipped with the app (still DSA-verified)
          Invoke-WebRequest -Uri "https://github.com/vslavik/winsparkle/releases/download/v0.8.1/WinSparkle-0.8.1.zip" -OutFile "external\winsparkle\WinSparkle-0.8.1.zip"
          Expand-Archive "external\winsparkle\WinSparkle-0.8.1.zip" -DestinationPath "external\winsparkle"
          # 0.9.3: only for bin\winsparkle-tool.exe (EdDSA signing in CI — dual-signed DSA->EdDSA transition)
          Invoke-WebRequest -Uri "https://github.com/vslavik/winsparkle/releases/download/v0.9.3/WinSparkle-0.9.3.zip" -OutFile "external\winsparkle\WinSparkle-0.9.3.zip"
          Expand-Archive "external\winsparkle\WinSparkle-0.9.3.zip" -DestinationPath "external\winsparkle"

      # Configure CMake (needed before build script)
      - name: Configure CMake
        shell: pwsh
        run: |
          cd cef-native
          cmake -B build -G "Visual Studio 17 2022" -A x64 -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" -DAPP_VERSION="${{ steps.version.outputs.VERSION }}" -DAPP_BUILD_NUMBER="${{ steps.version.outputs.BUILD_NUMBER }}"
      
      # Run the existing build script (created by your dev)
      - name: Build with release script
        shell: pwsh
        run: |
          .\scripts\build-release.ps1 -Version "${{ steps.version.outputs.VERSION }}"
      
      # Sign all executables and DLLs with Azure Trusted Signing
      # Unsigned DLLs inside a signed installer trigger AV heuristics
      - name: Sign executables and DLLs with Azure Trusted Signing
        uses: azure/trusted-signing-action@v1.2.0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ env.AZURE_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ env.AZURE_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ env.AZURE_SIGNING_PROFILE }}
          files-folder: ${{ github.workspace }}/staging/HodosBrowser
          files-folder-filter: exe,dll
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      # Re-create the portable zip from the SIGNED staging dir. build-release.ps1 zips it
      # BEFORE this signing step, so its binaries would otherwise ship unsigned (Goal-2).
      - name: Re-create portable zip from signed binaries
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          $zip = "${{ github.workspace }}\dist\HodosBrowser-$version-portable.zip"
          if (Test-Path $zip) { Remove-Item $zip -Force }
          Compress-Archive -Path "${{ github.workspace }}\staging\HodosBrowser\*" -DestinationPath $zip -CompressionLevel Optimal
          Write-Host "Re-zipped signed staging into $zip"

      # Re-run installer after signing (so installer contains signed exes)
      - name: Rebuild installer with signed executables
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          $version = "${{ steps.version.outputs.VERSION }}"
          & $iscc "/DAppVersion=$version" "/DProjectRoot=${{ github.workspace }}" "/DStagingDir=${{ github.workspace }}\staging\HodosBrowser" "/DDistDir=${{ github.workspace }}\dist" "installer\hodos-browser.iss"
      
      # Sign the final installer
      - name: Sign installer with Azure Trusted Signing
        uses: azure/trusted-signing-action@v1.2.0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ env.AZURE_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ env.AZURE_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ env.AZURE_SIGNING_PROFILE }}
          files-folder: ${{ github.workspace }}/dist
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256
      
      # Sign installer with DSA for WinSparkle auto-update verification
      - name: DSA sign installer for WinSparkle
        shell: bash
        env:
          DSA_PRIVATE_KEY: ${{ secrets.WINSPARKLE_DSA_PRIVATE_KEY }}
        id: dsa_sign
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          INSTALLER="dist/HodosBrowser-${VERSION}-setup.exe"

          if [ -z "$DSA_PRIVATE_KEY" ]; then
            echo "::error::WINSPARKLE_DSA_PRIVATE_KEY not set — refusing to publish an unsigned auto-update feed (Goal-2 fail-closed)"
            exit 1
          fi

          # Write DSA private key to temp file
          echo "$DSA_PRIVATE_KEY" > /tmp/dsa_priv.pem

          # Sign using WinSparkle's exact method (double SHA1): sha1 binary hash, then DSA sign that hash
          # This matches WinSparkle-0.8.1/bin/sign_update.bat
          DSA_SIG=$(openssl dgst -sha1 -binary < "$INSTALLER" | openssl dgst -sha1 -sign /tmp/dsa_priv.pem | openssl enc -base64 -A)
          rm /tmp/dsa_priv.pem

          echo "DSA signature: ${DSA_SIG:0:20}..."
          echo "DSA_SIGNATURE=$DSA_SIG" >> $GITHUB_OUTPUT

      # EdDSA sign installer for WinSparkle 0.9.x (dual-signed DSA->EdDSA transition).
      # Reuses the EXISTING macOS Ed25519 key (SPARKLE_EDDSA_PRIVATE_KEY) — WinSparkle 0.9.x
      # and Sparkle 2 share the Ed25519 scheme. A self-check derives the public key and
      # asserts it equals the SUPublicEDKey embedded in the client.
      # NON-BLOCKING during the 3a transition: the shipped client is still 0.8.1/DSA, so the
      # EdDSA signature is NOT yet load-bearing — if it can't be produced (e.g. the mac key
      # needs a format conversion) we log a warning and ship a DSA-only feed, which every
      # current client verifies fine. The self-check result in the CI log tells us whether
      # the key is reusable. This step becomes FAIL-CLOSED in commit 3b, when the client
      # switches to EdDSA-only and the EdDSA signature becomes mandatory.
      - name: EdDSA sign installer for WinSparkle
        shell: bash
        env:
          EDDSA_PRIVATE_KEY: ${{ secrets.SPARKLE_EDDSA_PRIVATE_KEY }}
        id: eddsa_sign_win
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          INSTALLER="dist/HodosBrowser-${VERSION}-setup.exe"
          TOOL="external/winsparkle/WinSparkle-0.9.3/bin/winsparkle-tool.exe"
          EXPECTED_PUB="GVq3mpDl8eelsG0A5wqC5FBYZd3fy7U3we9iZ9+Tq3Q="

          # Soft-skip: warn, emit an empty signature, let the release proceed DSA-only.
          # (Becomes a hard error in commit 3b once EdDSA is load-bearing.)
          soft_skip() { echo "::warning::EdDSA Windows signing skipped: $1 — shipping a DSA-only feed (fine while the client is 0.8.1)"; echo "EDDSA_SIGNATURE=" >> "$GITHUB_OUTPUT"; exit 0; }

          [ -n "$EDDSA_PRIVATE_KEY" ] || soft_skip "SPARKLE_EDDSA_PRIVATE_KEY not set"
          [ -f "$TOOL" ] || soft_skip "winsparkle-tool not found at $TOOL (0.9.3 download failed?)"

          printf '%s' "$EDDSA_PRIVATE_KEY" > /tmp/ed25519_win.key

          # Self-check: the derived public key MUST equal the embedded SUPublicEDKey.
          DERIVED_PUB=$("$TOOL" public-key -f /tmp/ed25519_win.key 2>&1 | grep -i 'Public key:' | head -1 | sed 's/.*Public key: *//' | tr -d '[:space:]' || true)
          if [ "$DERIVED_PUB" != "$EXPECTED_PUB" ]; then
            rm -f /tmp/ed25519_win.key
            soft_skip "derived pubkey '$DERIVED_PUB' != embedded '$EXPECTED_PUB' — the macOS key needs a one-time 32-byte format conversion before WinSparkle can reuse it"
          fi
          echo "EdDSA key self-check PASSED — the macOS key derives the embedded SUPublicEDKey (reuse confirmed)"

          EDDSA_SIG=$("$TOOL" sign "$INSTALLER" -f /tmp/ed25519_win.key 2>&1 || true)
          rm -f /tmp/ed25519_win.key
          [ -n "$EDDSA_SIG" ] || soft_skip "winsparkle-tool produced an empty signature"
          echo "Windows EdDSA signature: ${EDDSA_SIG:0:20}..."
          echo "EDDSA_SIGNATURE=$EDDSA_SIG" >> "$GITHUB_OUTPUT"

      # Upload for publish job
      - name: Upload Windows installer
        uses: actions/upload-artifact@v7
        with:
          name: windows-installer
          path: dist/*.exe
          if-no-files-found: error

      - name: Upload Windows portable zip
        uses: actions/upload-artifact@v7
        with:
          name: windows-portable
          path: dist/*.zip
          if-no-files-found: error

      - name: Upload DSA signature
        shell: bash
        run: |
          SIG="${{ steps.dsa_sign.outputs.DSA_SIGNATURE }}"
          if [ -n "$SIG" ]; then
            echo "$SIG" > dist/dsa_signature.txt
            echo "DSA signature saved to artifact"
          else
            echo "No DSA signature to upload"
            echo "" > dist/dsa_signature.txt
          fi
      - name: Upload DSA signature artifact
        uses: actions/upload-artifact@v7
        with:
          name: windows-dsa-signature
          path: dist/dsa_signature.txt

      - name: Upload Windows EdDSA signature
        shell: bash
        run: |
          SIG="${{ steps.eddsa_sign_win.outputs.EDDSA_SIGNATURE }}"
          echo "$SIG" > dist/win_eddsa_signature.txt
          echo "Windows EdDSA signature saved to artifact"
      - name: Upload Windows EdDSA signature artifact
        uses: actions/upload-artifact@v7
        with:
          name: windows-eddsa-signature
          path: dist/win_eddsa_signature.txt

  # ============================================================
  # MACOS BUILD
  # ============================================================
  build-macos:
    runs-on: macos-15
    env:
      MACOSX_DEPLOYMENT_TARGET: "11.0"

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Get version from tag
        id: version
        run: |
          version="${GITHUB_REF_NAME#v}"
          # Globally-monotonic macOS build number (-> CFBundleVersion). MUST strictly
          # increase across ALL releases — betas AND finals, across versions — or
          # Sparkle 2's integer comparator won't offer the update. The old logic
          # (bare "-beta.N", else 0) broke finals: a "v0.4.0" tag scored 0 and would
          # never supersede an installed beta.16 (16). New scheme:
          #   MAJOR*1000000 + MINOR*10000 + PATCH*100 + (beta N, or 99 for a final)
          #   0.3.0-beta.15 -> 30015 ; 0.3.0-beta.16 -> 30016 ; 0.4.0 -> 40099 ; 0.4.1-beta.1 -> 40101
          # Constraints: MINOR<100, PATCH<100, beta N<99; a final outranks all its betas.
          # KEEP BYTE-IDENTICAL to the publish job's appcast step (it bakes the same
          # number into sparkle:version, which is compared against this CFBundleVersion).
          core="${version%%-*}"
          maj="${core%%.*}"; rest="${core#*.}"; min="${rest%%.*}"; pat="${rest#*.}"
          beta=$(echo "$version" | sed -nE 's/^.*-beta\.([0-9]+)$/\1/p')
          [ -z "$beta" ] && beta=99
          case "$maj$min$pat$beta" in ''|*[!0-9]*) echo "ERROR: cannot parse version '$version' into a build number"; exit 1;; esac
          build_number=$(( 10#$maj * 1000000 + 10#$min * 10000 + 10#$pat * 100 + 10#$beta ))
          echo "VERSION=$version" >> $GITHUB_OUTPUT
          echo "BUILD_NUMBER=$build_number" >> $GITHUB_OUTPUT
          echo "Building version: $version (build number: $build_number)"

      # Download CEF binaries
      - name: Download CEF binaries
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download cef-binaries --pattern "cef-binaries-macos.tar.bz2" --repo ${{ github.repository }}

          echo "Extracting CEF binaries..."
          tar -xjf cef-binaries-macos.tar.bz2
          rm cef-binaries-macos.tar.bz2

          # Handle nested directory — find and rename to cef-binaries
          if [ ! -d "cef-binaries" ]; then
            extracted=$(find . -maxdepth 1 -type d -name "cef_binary*" -o -name "cef-binaries*" | head -1)
            if [ -n "$extracted" ]; then
              mv "$extracted" cef-binaries
            else
              echo "ERROR: Could not find extracted CEF directory"
              ls -la
              exit 1
            fi
          fi

          echo "CEF binaries extracted:"
          ls cef-binaries/

      # Build CEF wrapper if not pre-built
      - name: Build CEF wrapper
        run: |
          cd cef-binaries
          if [ ! -f "build/libcef_dll_wrapper/libcef_dll_wrapper.a" ]; then
            echo "Building CEF wrapper..."
            mkdir -p build && cd build
            cmake .. -DCMAKE_BUILD_TYPE=Release
            cmake --build . --target libcef_dll_wrapper --config Release
          else
            echo "CEF wrapper already built"
          fi

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            rust-wallet
            adblock-engine

      # Install C++ dependencies
      - name: Install macOS dependencies
        run: |
          brew install openssl nlohmann-json sqlite3

      # Build Rust wallet
      - name: Build Rust wallet
        run: |
          cd rust-wallet
          cargo build --release

      # Build adblock engine
      - name: Build adblock engine
        run: |
          cd adblock-engine
          cargo build --release

      # Build frontend
      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      # Download Sparkle 2 framework for auto-updates
      - name: Download Sparkle 2
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Downloading Sparkle 2.9.3..."
          gh release download 2.9.3 --repo sparkle-project/Sparkle --pattern "Sparkle-*.tar.xz" --output Sparkle.tar.xz
          mkdir -p sparkle-extract
          tar -xf Sparkle.tar.xz -C sparkle-extract
          ls -la sparkle-extract/
          # Copy framework to expected location
          mkdir -p external
          cp -r sparkle-extract/Sparkle.framework external/Sparkle.framework
          echo "Sparkle 2 framework installed:"
          ls -la external/Sparkle.framework/

      # Build CEF shell
      - name: Configure and build CEF shell
        run: |
          cd cef-native
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0 -DAPP_VERSION="${{ steps.version.outputs.VERSION }}" -DAPP_BUILD_NUMBER="${{ steps.version.outputs.BUILD_NUMBER }}"
          cmake --build build --config Release

          cd build/bin

          echo "=== Full app bundle structure ==="
          find HodosBrowser.app -type d | head -40

          # Fix double-nested Contents/Contents issue from CMake
          if [ -d "HodosBrowser.app/Contents/Contents" ]; then
            echo "Found double-nested Contents — fixing..."
            # Move everything from Contents/Contents/Frameworks to Contents/Frameworks
            if [ -d "HodosBrowser.app/Contents/Contents/Frameworks" ]; then
              mkdir -p "HodosBrowser.app/Contents/Frameworks"
              cp -r HodosBrowser.app/Contents/Contents/Frameworks/* "HodosBrowser.app/Contents/Frameworks/" 2>/dev/null || true
              rm -rf "HodosBrowser.app/Contents/Contents"
            fi
          fi

          # Also copy standalone helpers from build/bin into Frameworks
          for helper in "HodosBrowser Helper"*.app; do
            if [ -d "$helper" ] && [[ "$helper" != *"HodosBrowser.app"* ]]; then
              echo "Copying standalone helper: $helper"
              cp -r "$helper" "HodosBrowser.app/Contents/Frameworks/"
            fi
          done

          echo "=== Fixed Frameworks contents ==="
          ls -la "HodosBrowser.app/Contents/Frameworks/" 2>/dev/null || echo "No Frameworks dir"
          echo "=== Verify no double Contents ==="
          find HodosBrowser.app -path "*/Contents/Contents*" -type d | head -5 || echo "Clean — no double nesting"

      # Copy Rust binaries and frontend into app bundle
      - name: Assemble app bundle
        run: |
          APP="cef-native/build/bin/HodosBrowser.app/Contents"

          # Copy Rust binaries into MacOS/
          cp rust-wallet/target/release/hodos-wallet "$APP/MacOS/"
          cp adblock-engine/target/release/hodos-adblock "$APP/MacOS/"

          # Copy frontend into Resources/frontend/
          mkdir -p "$APP/Resources/frontend"
          cp -r frontend/dist/* "$APP/Resources/frontend/"

          # Generate macOS icon from the PNG source
          # Info.plist references hodos.icns via CFBundleIconFile
          if [ -f "cef-native/mac/hodos-icon.png" ]; then
            echo "Generating hodos.icns from source PNG..."
            mkdir -p hodos.iconset
            sips -z 16 16 cef-native/mac/hodos-icon.png --out hodos.iconset/icon_16x16.png
            sips -z 32 32 cef-native/mac/hodos-icon.png --out hodos.iconset/icon_16x16@2x.png
            sips -z 32 32 cef-native/mac/hodos-icon.png --out hodos.iconset/icon_32x32.png
            sips -z 64 64 cef-native/mac/hodos-icon.png --out hodos.iconset/icon_32x32@2x.png
            sips -z 128 128 cef-native/mac/hodos-icon.png --out hodos.iconset/icon_128x128.png
            sips -z 256 256 cef-native/mac/hodos-icon.png --out hodos.iconset/icon_128x128@2x.png
            sips -z 256 256 cef-native/mac/hodos-icon.png --out hodos.iconset/icon_256x256.png
            sips -z 512 512 cef-native/mac/hodos-icon.png --out hodos.iconset/icon_256x256@2x.png
            sips -z 512 512 cef-native/mac/hodos-icon.png --out hodos.iconset/icon_512x512.png
            sips -z 1024 1024 cef-native/mac/hodos-icon.png --out hodos.iconset/icon_512x512@2x.png
            iconutil -c icns hodos.iconset -o "$APP/Resources/hodos.icns"
            rm -rf hodos.iconset
            echo "hodos.icns generated and copied to app bundle"
          else
            echo "WARNING: cef-native/mac/hodos-icon.png not found — no app icon"
          fi

          # Copy Sparkle.framework and fix symlink structure
          if [ -d "external/Sparkle.framework" ]; then
            ditto external/Sparkle.framework "$APP/Frameworks/Sparkle.framework"

            SPARKLE_FW="$APP/Frameworks/Sparkle.framework"

            # Fix Versions/Current symlink (ditto/tar may create copies instead)
            if [ -d "$SPARKLE_FW/Versions/B" ]; then
              rm -rf "$SPARKLE_FW/Versions/Current"
              ln -s B "$SPARKLE_FW/Versions/Current"
            fi

            # Remove Sparkle's XPC services. They are only needed for
            # sandboxed (Mac App Store) apps. As a non-sandboxed Developer
            # ID app we use Sparkle's in-process update path. Their
            # bootstrap-launch fails when the framework carries quarantine
            # post-install (which happens with browser-downloaded DMGs
            # despite notarization+stapling), silently breaking auto-update.
            # Sparkle 2 falls back to in-process when XPC services are
            # absent — no Info.plist flag needed; just delete them.
            echo "Removing Sparkle XPC services (not needed for non-sandboxed app)..."
            rm -rf "$SPARKLE_FW/Versions/B/XPCServices"

            # Fix ALL top-level items → symlinks to Versions/Current/*
            # Any real file/dir at root level causes "unsealed contents" error
            for item in Autoupdate Sparkle Updater.app XPCServices Headers Resources Modules PrivateHeaders; do
              rm -rf "$SPARKLE_FW/$item"
              if [ -e "$SPARKLE_FW/Versions/Current/$item" ]; then
                ln -s "Versions/Current/$item" "$SPARKLE_FW/$item"
              fi
            done

            echo "Sparkle.framework copied with symlinks fixed"
          fi

          # Verify helper location (must be Contents/Frameworks, not Contents/Contents/Frameworks)
          echo "App bundle structure:"
          find "cef-native/build/bin/HodosBrowser.app" -maxdepth 4 -type d | head -30

      # Verify every shipped Mach-O's minos >= the CEF framework's minos.
      # An under-stamped binary passes the loader but dyld fails to load
      # the higher-minos framework → launch crash on older macOS.
      - name: Minos deployment-target guard
        run: |
          set -euo pipefail
          read_minos() { vtool -show-build "$1" | awk '/minos/{print $2; exit}'; }
          APP="cef-native/build/bin/HodosBrowser.app"
          FW="$APP/Contents/Frameworks/Chromium Embedded Framework.framework/Chromium Embedded Framework"
          FW_MINOS=$(read_minos "$FW")
          echo "CEF framework minos: $FW_MINOS"

          TARGETS=(
            "$APP/Contents/MacOS/HodosBrowser"
            "$APP"/Contents/Frameworks/HodosBrowser\ Helper*.app/Contents/MacOS/*
            "$APP/Contents/MacOS/hodos-wallet"
            "$APP/Contents/MacOS/hodos-adblock"
          )
          fail=0
          for t in "${TARGETS[@]}"; do
            [ -f "$t" ] || continue
            m=$(read_minos "$t") || { echo "::error::no minos for $t"; fail=1; continue; }
            awk -v a="$m" -v b="$FW_MINOS" 'BEGIN{split(a,x,".");split(b,y,"."); if (x[1]<y[1]||(x[1]==y[1]&&x[2]<y[2])) exit 1}' \
              || { echo "::error::$t minos=$m < framework $FW_MINOS"; fail=1; }
            echo "  OK: $t minos=$m"
          done
          [ "$fail" = 0 ] || { echo "::error::minos guard FAILED — would brick auto-update on sub-$FW_MINOS macOS"; exit 1; }
          echo "minos guard PASSED (all >= framework $FW_MINOS)"

      # Import signing certificate
      - name: Import code signing certificate
        env:
          MACOS_CERT_BASE64: ${{ secrets.MACOS_CERT_BASE64 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          # Create temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          echo "$MACOS_CERT_BASE64" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 -P "$MACOS_CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          # Find signing identity
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      # Sign the app bundle
      - name: Sign app bundle
        run: |
          APP="cef-native/build/bin/HodosBrowser.app"
          ENTITLEMENTS="cef-native/mac/entitlements.plist"
          # Fix Windows CRLF line endings that break codesign plist parsing
          sed -i '' 's/\r$//' "$ENTITLEMENTS"
          IDENTITY="Developer ID Application: Matthew Archbold"
          CODESIGN="codesign --force --timestamp --options runtime --sign"

          # 0. Strip ALL existing signatures (CMake applies ad-hoc sigs during build)
          echo "Stripping all existing signatures..."
          find "$APP" -type f | while read f; do
            file_type=$(file -b "$f" 2>/dev/null || echo "")
            if echo "$file_type" | grep -q "Mach-O"; then
              codesign --remove-signature "$f" 2>/dev/null || true
            fi
          done
          find "$APP" -name "_CodeSignature" -type d -exec rm -rf {} + 2>/dev/null || true
          echo "All signatures stripped."

          # 1. Sign CEF dylibs
          find "$APP/Contents/Frameworks/Chromium Embedded Framework.framework" -name "*.dylib" -type f | while read dylib; do
            echo "Signing dylib: $dylib"
            $CODESIGN "$IDENTITY" "$dylib"
          done

          # 2. Sign CEF framework
          $CODESIGN "$IDENTITY" --entitlements "$ENTITLEMENTS" \
            "$APP/Contents/Frameworks/Chromium Embedded Framework.framework"

          # 3. Sign CEF helpers — executable first, then bundle
          for helper in "$APP/Contents/Frameworks/HodosBrowser Helper"*.app; do
            if [ -d "$helper" ]; then
              helper_exec="$helper/Contents/MacOS/$(basename "$helper" .app)"
              if [ -f "$helper_exec" ]; then
                echo "Signing helper exec: $helper_exec"
                $CODESIGN "$IDENTITY" --entitlements "$ENTITLEMENTS" "$helper_exec"
              fi
              echo "Signing helper bundle: $helper"
              $CODESIGN "$IDENTITY" --entitlements "$ENTITLEMENTS" "$helper"
            fi
          done

          # 4. Sign Sparkle — matching Brave/steipete/rsms proven pattern
          SPARKLE="$APP/Contents/Frameworks/Sparkle.framework"
          if [ -d "$SPARKLE/Versions/B" ]; then
            echo "=== Sparkle framework structure ==="
            echo "Root contents:"
            ls -la "$SPARKLE/"
            echo "Versions:"
            ls -la "$SPARKLE/Versions/"
            echo "Versions/B:"
            ls -la "$SPARKLE/Versions/B/"
            echo "Symlink check (Current -> ?):"
            readlink "$SPARKLE/Versions/Current" || echo "NOT A SYMLINK"
            echo "Top-level symlink check:"
            for item in Autoupdate Sparkle Updater.app XPCServices Headers Resources; do
              if [ -e "$SPARKLE/$item" ]; then
                readlink "$SPARKLE/$item" || echo "$item: NOT A SYMLINK (real file/dir)"
              fi
            done
            echo "=== End structure ==="

            echo "Signing Sparkle framework (Brave/steipete pattern)..."
            SPARKLE_SIGN="codesign -f -s"

            # XPC services were removed earlier (see "Assemble app bundle"
            # step). Sparkle 2 uses its in-process update path when they
            # are absent — required for our non-sandboxed Developer ID app
            # to avoid quarantine-driven bootstrap-launch failures.

            # 1. Autoupdate + Updater.app
            $SPARKLE_SIGN "$IDENTITY" -o runtime \
              "$SPARKLE/Versions/B/Autoupdate"
            $SPARKLE_SIGN "$IDENTITY" -o runtime \
              "$SPARKLE/Versions/B/Updater.app"

            # 2. Top-level Sparkle.framework
            $SPARKLE_SIGN "$IDENTITY" -o runtime \
              "$SPARKLE"

            echo "Sparkle framework signed"
          fi

          # 5. Sign Rust binaries
          $CODESIGN "$IDENTITY" "$APP/Contents/MacOS/hodos-wallet"
          $CODESIGN "$IDENTITY" "$APP/Contents/MacOS/hodos-adblock"

          # 6. Sign main executable separately with entitlements
          $CODESIGN "$IDENTITY" --entitlements "$ENTITLEMENTS" "$APP/Contents/MacOS/HodosBrowser"

          # Verify the exe signature is valid BEFORE bundle signing
          echo "=== Verify exe before bundle sign ==="
          codesign --verify --verbose=4 "$APP/Contents/MacOS/HodosBrowser" 2>&1 || echo "EXE VERIFY FAILED"

          # 7. Sign the app bundle (seals resources around the already-signed exe)
          $CODESIGN "$IDENTITY" --entitlements "$ENTITLEMENTS" "$APP"

          # Verify the exe is still valid AFTER bundle signing
          echo "=== Verify exe after bundle sign ==="
          codesign --verify --verbose=4 "$APP/Contents/MacOS/HodosBrowser" 2>&1 || echo "EXE VERIFY FAILED AFTER BUNDLE SIGN"

          # Full bundle verify (will fail on Sparkle ambiguous but that's ok)
          echo "=== Verify full bundle ==="
          codesign --verify --verbose=4 "$APP" 2>&1 || echo "Bundle verify had issues (expected with Sparkle)"

          # Check binary structure
          echo "=== Binary info ==="
          file "$APP/Contents/MacOS/HodosBrowser"
          otool -l "$APP/Contents/MacOS/HodosBrowser" | grep -A5 LC_CODE_SIGNATURE
          ls -la "$APP/Contents/MacOS/HodosBrowser"

          echo "Signing complete. Notarization will verify all signatures."

      # Notarize
      - name: Notarize app
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
        run: |
          APP="cef-native/build/bin/HodosBrowser.app"

          # Write API key
          mkdir -p ~/private_keys
          echo "$APPLE_API_KEY_P8_BASE64" | base64 --decode > ~/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8

          # Create zip for notarization using --sequesterRsrc to preserve resource forks and code signatures
          /usr/bin/ditto -c -k --sequesterRsrc --keepParent "$APP" HodosBrowser-notarize.zip

          # Submit for notarization — MUST succeed or build fails
          echo "Submitting for notarization (timeout: 2 hours)..."
          # notarytool can exit NON-zero on auth/credential failure (e.g. an
          # expired App Store Connect API key or a pending Program License
          # Agreement). Under the step's default `set -e`, that would abort
          # before we print Apple's error. Disable -e around the capture so the
          # exact reason + exit code always surface in the log.
          set +e
          NOTARIZE_OUTPUT=$(xcrun notarytool submit HodosBrowser-notarize.zip \
            --key ~/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8 \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER" \
            --wait --timeout 7200 2>&1)
          NOTARYTOOL_EXIT=$?
          set -e
          echo "$NOTARIZE_OUTPUT"
          echo "notarytool submit exit code: $NOTARYTOOL_EXIT"

          # Extract submission ID for log fetching
          SUBMISSION_ID=$(echo "$NOTARIZE_OUTPUT" | grep "id:" | head -1 | awk '{print $2}')

          # Check if notarization actually succeeded (notarytool returns 0 even on Invalid)
          if echo "$NOTARIZE_OUTPUT" | grep -q "status: Accepted"; then
            echo "Notarization accepted — stapling ticket..."
            xcrun stapler staple "$APP"
            echo "Stapling complete — app is fully notarized"
          else
            echo "ERROR: Notarization failed!"
            echo "Fetching notarization log for details..."
            xcrun notarytool log "$SUBMISSION_ID" \
              --key ~/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8 \
              --key-id "$APPLE_API_KEY_ID" \
              --issuer "$APPLE_API_ISSUER" 2>&1 || true
            exit 1
          fi

          rm -f HodosBrowser-notarize.zip

      # Create DMG with drag-to-Applications
      - name: Create DMG
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          APP="cef-native/build/bin/HodosBrowser.app"

          # Stage the .app alongside an /Applications symlink for drag-to-install
          mkdir -p dist dmg-staging
          cp -R "$APP" dmg-staging/
          ln -s /Applications dmg-staging/Applications

          hdiutil create -volname "HodosBrowser" -srcfolder dmg-staging -ov -format UDZO "dist/HodosBrowser-${VERSION}.dmg"
          rm -rf dmg-staging

          # Sign the DMG too
          codesign --force --sign "Developer ID Application: Matthew Archbold" "dist/HodosBrowser-${VERSION}.dmg"

      # Notarize and staple the DMG itself so Gatekeeper validates the
      # entire distribution offline. Without this, quarantine on the
      # downloaded DMG propagates to nested code (Sparkle.framework's
      # XPC services) and macOS refuses to bootstrap-launch them, which
      # silently breaks Sparkle auto-update on macOS.
      - name: Notarize and staple DMG
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          DMG="dist/HodosBrowser-${VERSION}.dmg"

          echo "Submitting DMG for notarization (timeout: 2 hours)..."
          # See note in the app "Notarize" step: keep -e off around the capture
          # so a non-zero notarytool exit still prints Apple's exact error.
          set +e
          NOTARIZE_OUTPUT=$(xcrun notarytool submit "$DMG" \
            --key ~/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8 \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER" \
            --wait --timeout 7200 2>&1)
          NOTARYTOOL_EXIT=$?
          set -e
          echo "$NOTARIZE_OUTPUT"
          echo "notarytool submit exit code: $NOTARYTOOL_EXIT"

          SUBMISSION_ID=$(echo "$NOTARIZE_OUTPUT" | grep "id:" | head -1 | awk '{print $2}')

          if echo "$NOTARIZE_OUTPUT" | grep -q "status: Accepted"; then
            echo "DMG notarization accepted — stapling ticket..."
            xcrun stapler staple "$DMG"
            echo "DMG stapled successfully"
            echo "=== stapler validate output ==="
            xcrun stapler validate "$DMG"
            echo "=== spctl assessment ==="
            spctl --assess --type install --verbose "$DMG" 2>&1 || echo "(spctl warning above is informational)"
          else
            echo "ERROR: DMG notarization failed!"
            echo "Fetching notarization log..."
            xcrun notarytool log "$SUBMISSION_ID" \
              --key ~/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8 \
              --key-id "$APPLE_API_KEY_ID" \
              --issuer "$APPLE_API_ISSUER" 2>&1 || true
            exit 1
          fi

      # EdDSA sign the DMG for Sparkle 2 auto-update verification
      - name: EdDSA sign DMG for Sparkle
        shell: bash
        env:
          EDDSA_PRIVATE_KEY: ${{ secrets.SPARKLE_EDDSA_PRIVATE_KEY }}
        id: eddsa_sign
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          DMG="dist/HodosBrowser-${VERSION}.dmg"

          if [ -z "$EDDSA_PRIVATE_KEY" ]; then
            echo "WARNING: SPARKLE_EDDSA_PRIVATE_KEY not set — skipping EdDSA signing"
            echo "EDDSA_SIGNATURE=" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Write EdDSA private key to temp file (strip trailing newline from echo)
          printf '%s' "$EDDSA_PRIVATE_KEY" > /tmp/ed25519_priv.pem

          # Diagnostic: how many chars did GitHub actually give us?
          # 44 chars = new 32-byte seed format (correct)
          # 88 chars = old 64-byte concat format (wrong)
          # Anything else = malformed
          KEY_LEN=$(wc -c < /tmp/ed25519_priv.pem | tr -d ' ')
          echo "=== Secret length: $KEY_LEN chars ==="
          if [ "$KEY_LEN" = "44" ]; then
            echo "  -> 44 chars = 32 bytes decoded (Sparkle 'regular seed' format) ✓"
          elif [ "$KEY_LEN" = "88" ]; then
            echo "  -> 88 chars = 64 bytes decoded (WRONG — update GitHub secret to 32-byte seed)"
          else
            echo "  -> unexpected length, expected 44"
          fi

          # Sparkle 2.x ships sign_update in sparkle-extract/bin/, NOT inside the framework
          SIGN_TOOL="sparkle-extract/bin/sign_update"

          echo "=== sparkle-extract/bin contents ==="
          ls -la sparkle-extract/bin/ 2>/dev/null || echo "sparkle-extract/bin missing"
          echo "=== DMG ==="
          ls -la "$DMG" 2>/dev/null || { echo "ERROR: DMG not found at $DMG"; exit 1; }

          if [ ! -f "$SIGN_TOOL" ]; then
            echo "ERROR: sign_update not found at $SIGN_TOOL"
            exit 1
          fi
          chmod +x "$SIGN_TOOL" || true

          # Run sign_update capturing BOTH stdout and stderr so we can see errors
          # (don't pipe through grep — pipefail swallows diagnostic output on failure)
          SIGN_OUT=$("$SIGN_TOOL" "$DMG" --ed-key-file /tmp/ed25519_priv.pem 2>&1) || {
            echo "ERROR: sign_update failed with exit code $?"
            echo "Output was:"
            echo "$SIGN_OUT"
            exit 1
          }
          echo "sign_update output: $SIGN_OUT"

          EDDSA_SIG=$(echo "$SIGN_OUT" | grep -o 'sparkle:edSignature="[^"]*"' | cut -d'"' -f2)
          if [ -z "$EDDSA_SIG" ]; then
            echo "ERROR: could not extract sparkle:edSignature from sign_update output"
            exit 1
          fi
          echo "EdDSA signature: ${EDDSA_SIG:0:20}..."
          echo "EDDSA_SIGNATURE=$EDDSA_SIG" >> $GITHUB_OUTPUT

          rm -f /tmp/ed25519_priv.pem

      # Upload
      - name: Upload macOS DMG
        uses: actions/upload-artifact@v7
        with:
          name: macos-dmg
          path: dist/*.dmg
          if-no-files-found: error

      - name: Upload EdDSA signature
        shell: bash
        run: |
          mkdir -p dist
          SIG="${{ steps.eddsa_sign.outputs.EDDSA_SIGNATURE }}"
          if [ -n "$SIG" ]; then
            echo "$SIG" > dist/eddsa_signature.txt
            echo "EdDSA signature saved to artifact"
          else
            echo "No EdDSA signature to upload"
            echo "" > dist/eddsa_signature.txt
          fi
      - name: Upload EdDSA signature artifact
        uses: actions/upload-artifact@v7
        with:
          name: macos-eddsa-signature
          path: dist/eddsa_signature.txt

  # ============================================================
  # PUBLISH RELEASE
  # ============================================================
  publish:
    needs: [build-windows, build-macos]
    # Pinned (kill silent drift): the crypto-verify step needs openssl >= 3 (Ed25519
    # -rawin); don't let a floating image move it under us. ubuntu-24.04 ships openssl 3.x.
    runs-on: ubuntu-24.04
    permissions:
      contents: write  # Needed to create releases

    steps:
      - name: Checkout code (for appcast script)
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: List artifacts
        run: |
          echo "Downloaded artifacts:"
          find artifacts -type f

      - name: Generate checksums
        run: |
          cd artifacts
          find . -type f \( -name "*.exe" -o -name "*.zip" -o -name "*.dmg" \) -exec sha256sum {} \; > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Generate appcast.xml
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          REPO_URL="https://github.com/${{ github.repository }}/releases/download/${GITHUB_REF_NAME}"

          # Globally-monotonic macOS build number (-> sparkle:version). MUST be computed
          # identically to the build-macos "Get version from tag" step, which bakes the
          # same number into CFBundleVersion — Sparkle 2 compares this appcast integer
          # against the installed CFBundleVersion. Scheme:
          #   MAJOR*1000000 + MINOR*10000 + PATCH*100 + (beta N, or 99 for a final)
          #   0.3.0-beta.16 -> 30016 ; 0.4.0 -> 40099 ; 0.4.1-beta.1 -> 40101
          core="${VERSION%%-*}"
          maj="${core%%.*}"; rest="${core#*.}"; min="${rest%%.*}"; pat="${rest#*.}"
          beta=$(echo "$VERSION" | sed -nE 's/^.*-beta\.([0-9]+)$/\1/p')
          [ -z "$beta" ] && beta=99
          case "$maj$min$pat$beta" in ''|*[!0-9]*) echo "ERROR: cannot parse version '$VERSION' into a build number"; exit 1;; esac
          BUILD_NUMBER=$(( 10#$maj * 1000000 + 10#$min * 10000 + 10#$pat * 100 + 10#$beta ))
          echo "Build number derived from tag: $BUILD_NUMBER"

          ls -la artifacts/ || true
          ls -la artifacts/*/ || true

          # Get file sizes
          WIN_SIZE=$(find artifacts -name "HodosBrowser-${VERSION}-setup.exe" -exec stat -c%s {} \; 2>/dev/null | head -1)
          MAC_SIZE=$(find artifacts -name "HodosBrowser-${VERSION}.dmg" -exec stat -c%s {} \; 2>/dev/null | head -1)
          WIN_SIZE=${WIN_SIZE:-0}
          MAC_SIZE=${MAC_SIZE:-0}

          # Read DSA signature if available
          WIN_SIG=$(cat artifacts/windows-dsa-signature/dsa_signature.txt 2>/dev/null || echo "")

          # Read Windows EdDSA signature if available (dual-signed DSA->EdDSA transition)
          WIN_ED_SIG=$(cat artifacts/windows-eddsa-signature/win_eddsa_signature.txt 2>/dev/null || echo "")

          # Read EdDSA signature if available
          MAC_SIG=$(cat artifacts/macos-eddsa-signature/eddsa_signature.txt 2>/dev/null || echo "")

          APPCAST_ARGS="--version $VERSION"
          APPCAST_ARGS="$APPCAST_ARGS --build-number $BUILD_NUMBER"
          APPCAST_ARGS="$APPCAST_ARGS --windows-url ${REPO_URL}/HodosBrowser-${VERSION}-setup.exe"
          APPCAST_ARGS="$APPCAST_ARGS --windows-size $WIN_SIZE"
          APPCAST_ARGS="$APPCAST_ARGS --macos-url ${REPO_URL}/HodosBrowser-${VERSION}.dmg"
          APPCAST_ARGS="$APPCAST_ARGS --macos-size $MAC_SIZE"
          APPCAST_ARGS="$APPCAST_ARGS --output appcast.xml"
          if [ -n "$WIN_SIG" ]; then
            APPCAST_ARGS="$APPCAST_ARGS --windows-signature $WIN_SIG"
            echo "Windows DSA signature included in appcast"
          else
            echo "WARNING: No Windows DSA signature found"
          fi
          if [ -n "$WIN_ED_SIG" ]; then
            APPCAST_ARGS="$APPCAST_ARGS --windows-ed-signature $WIN_ED_SIG"
            echo "Windows EdDSA signature included in appcast (dual-signed)"
          fi
          if [ -n "$MAC_SIG" ]; then
            APPCAST_ARGS="$APPCAST_ARGS --macos-signature $MAC_SIG"
            echo "macOS EdDSA signature included in appcast"
          else
            echo "WARNING: No macOS EdDSA signature found"
          fi

          python3 scripts/generate-appcast.py $APPCAST_ARGS

          cat appcast.xml
          test -s appcast.xml || { echo "ERROR: appcast.xml was not generated"; exit 1; }
          cp appcast.xml artifacts/appcast.xml

      # Commit 4c: sign the WHOLE appcast document (anti-replay / anti-tamper).
      # Produces a detached Ed25519 sidecar appcast.xml.ed over
      # (prefix||appcast-bytes); the silent updater (UpdateStager::
      # VerifyAppcastDocument) verifies it BEFORE parsing any item.
      # SOFT during transition: the sidecar is consumed ONLY by the silent path,
      # which is inert until the 4d wiring lands — so a key-format miss here warns
      # and ships no sidecar rather than blocking the (notify-only) release. The
      # self-check below tells us, on each release, whether the Sparkle key
      # converts for openssl. MUST be green before commit 4d wires the consumer;
      # hardens to fail-closed at silent-enable.
      - name: Sign appcast document (EdDSA sidecar)
        shell: bash
        env:
          EDDSA_PRIVATE_KEY: ${{ secrets.SPARKLE_EDDSA_PRIVATE_KEY }}
        run: |
          EXPECTED_PUB="GVq3mpDl8eelsG0A5wqC5FBYZd3fy7U3we9iZ9+Tq3Q="
          soft() { echo "::warning::appcast-doc signing skipped: $1 — shipping no sidecar (fine until the silent path is wired in 4d)"; exit 0; }
          [ -n "$EDDSA_PRIVATE_KEY" ] || soft "SPARKLE_EDDSA_PRIVATE_KEY not set"

          # Sparkle exports the Ed25519 key base64; the first 32 bytes are the seed.
          # Wrap it as a PKCS#8 Ed25519 PEM openssl can sign with.
          SEED_HEX=$(printf '%s' "$EDDSA_PRIVATE_KEY" | base64 -d 2>/dev/null | head -c 32 | xxd -p -c 999 || true)
          [ ${#SEED_HEX} -eq 64 ] || soft "could not extract a 32-byte seed from the Sparkle key"
          { printf '302e020100300506032b657004220420%s' "$SEED_HEX" | xxd -r -p | openssl base64 > /tmp/seed.b64; } || soft "PEM wrap failed"
          { echo "-----BEGIN PRIVATE KEY-----"; cat /tmp/seed.b64; echo "-----END PRIVATE KEY-----"; } > /tmp/appcast_ed.pem

          # Self-check: derived pubkey MUST equal the embedded SUPublicEDKey.
          DERIVED=$(openssl pkey -in /tmp/appcast_ed.pem -pubout -outform DER 2>/dev/null | tail -c 32 | openssl base64 | tr -d '\n' || true)
          if [ "$DERIVED" != "$EXPECTED_PUB" ]; then
            rm -f /tmp/appcast_ed.pem /tmp/seed.b64
            soft "derived pubkey '$DERIVED' != embedded '$EXPECTED_PUB' (Sparkle-key→PEM conversion needs work)"
          fi
          echo "appcast-doc key self-check PASSED (derives the embedded SUPublicEDKey)"

          python3 scripts/sign-appcast.py --in appcast.xml --key /tmp/appcast_ed.pem --out appcast.xml.ed || soft "py-sign failed"

          # Local self-verify before publish: the sidecar MUST verify against the
          # exact appcast bytes (catches any byte-stability slip up to upload).
          openssl pkey -in /tmp/appcast_ed.pem -pubout -out /tmp/appcast_ed_pub.pem 2>/dev/null || soft "pubkey extract failed"
          { printf 'hodos-appcast-v1\n'; cat appcast.xml; } > /tmp/appcast_msg.bin
          openssl base64 -d -in appcast.xml.ed -out /tmp/appcast_sig.bin || soft "sidecar base64 decode failed"
          if ! openssl pkeyutl -verify -rawin -pubin -inkey /tmp/appcast_ed_pub.pem \
                 -in /tmp/appcast_msg.bin -sigfile /tmp/appcast_sig.bin >/dev/null 2>&1; then
            rm -f /tmp/appcast_ed.pem /tmp/appcast_ed_pub.pem /tmp/appcast_msg.bin /tmp/appcast_sig.bin /tmp/seed.b64
            soft "local self-verify of the sidecar failed"
          fi
          rm -f /tmp/appcast_ed.pem /tmp/appcast_ed_pub.pem /tmp/appcast_msg.bin /tmp/appcast_sig.bin /tmp/seed.b64

          cp appcast.xml.ed artifacts/appcast.xml.ed
          echo "appcast.xml.ed produced + self-verified"

      # Create the release as a DRAFT first. Nothing is public yet — we verify the
      # assets + appcast below and only then promote it live. A verification failure
      # therefore leaves NOTHING public (RED = not shipped), instead of a broken
      # release already auto-updating to users.
      - name: Create draft GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            artifacts/windows-installer/*
            artifacts/windows-portable/*
            artifacts/macos-dmg/*
            artifacts/appcast.xml
            artifacts/appcast.xml.ed
            artifacts/SHA256SUMS.txt

      - name: Verify draft release is complete
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          REPO="${{ github.repository }}"
          EXPECTED="HodosBrowser-${VERSION}-setup.exe HodosBrowser-${VERSION}-portable.zip HodosBrowser-${VERSION}.dmg appcast.xml SHA256SUMS.txt"
          gh release view "${GITHUB_REF_NAME}" --repo "$REPO" --json assets > assets.json
          echo "=== draft assets ==="; jq -r '.assets[] | "\(.name)\t\(.size)\t\(.state)"' assets.json
          for name in $EXPECTED; do
            size=$(jq -r --arg n "$name" '.assets[] | select(.name==$n) | .size' assets.json)
            state=$(jq -r --arg n "$name" '.assets[] | select(.name==$n) | .state' assets.json)
            { [ -n "$size" ] && [ "$size" != "null" ]; } || { echo "ERROR: release asset missing: $name"; exit 1; }
            [ "$state" = "uploaded" ] || { echo "ERROR: asset $name not fully uploaded (state=$state)"; exit 1; }
            # Size floor per file class: installers are 100+ MB; SHA256SUMS.txt /
            # appcast.xml are legitimately a few hundred bytes — just non-empty.
            case "$name" in *.exe|*.zip|*.dmg) min=1000000 ;; *) min=50 ;; esac
            [ "$size" -gt "$min" ] || { echo "ERROR: asset $name suspiciously small ($size bytes, expected > $min)"; exit 1; }
          done
          echo "All expected assets present, uploaded, and non-trivial."

      - name: Verify appcast advertises this version (offline)
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          V_ESC="${VERSION//./\\.}"
          test -s appcast.xml || { echo "ERROR: appcast.xml missing/empty"; exit 1; }
          # macOS display version must equal THIS version exactly (not a substring)
          grep -qE "<sparkle:shortVersionString>${V_ESC}</sparkle:shortVersionString>" appcast.xml \
            || { echo "ERROR: appcast shortVersionString is not ${VERSION}"; exit 1; }
          # both enclosures must point at THIS version's files
          grep -qF -- "HodosBrowser-${VERSION}-setup.exe" appcast.xml || { echo "ERROR: appcast missing Windows enclosure for ${VERSION}"; exit 1; }
          grep -qF -- "HodosBrowser-${VERSION}.dmg"       appcast.xml || { echo "ERROR: appcast missing macOS enclosure for ${VERSION}"; exit 1; }
          # both enclosures must carry a non-empty signature (generate-appcast.py fails closed,
          # but double-check the serialized XML so an empty attr can never ship silently)
          grep -qE 'sparkle:dsaSignature="[^"]+"' appcast.xml || { echo "ERROR: Windows enclosure has no DSA signature"; exit 1; }
          grep -qE 'sparkle:edSignature="[^"]+"'  appcast.xml || { echo "ERROR: macOS enclosure has no EdDSA signature"; exit 1; }
          echo "Appcast verified for ${VERSION}: version + both enclosures + signatures present."

      # T4(a) / Track-0 Pillar A: CRYPTOGRAPHICALLY verify the appcast signatures
      # against the real artifacts, using the SAME public keys the shipped client
      # embeds (DSA from AutoUpdater.cpp, Ed25519 from Info.plist's SUPublicEDKey).
      # The grep above only proves a signature *string is present*; this proves it
      # actually *verifies* — so a mis-signed feed can never be promoted. Includes a
      # built-in mutation self-test (corrupted sig MUST fail) so the verifier can
      # never silently degrade into a no-op. Fail-closed: runs BEFORE Promote, so a
      # failure leaves nothing public. Validated offline against beta.16's real
      # artifacts (genuine -> pass, corrupted/cross/wrong-payload -> reject).
      - name: Cryptographically verify update signatures (fail-closed)
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          # -print -quit stops at the first match with no pipe (avoids head closing the
          # pipe and SIGPIPE-killing find under pipefail).
          WIN=$(find artifacts -name "HodosBrowser-${VERSION}-setup.exe" -print -quit)
          DMG=$(find artifacts -name "HodosBrowser-${VERSION}.dmg" -print -quit)
          [ -n "$WIN" ] || { echo "::error::installer artifact not found for ${VERSION}"; exit 1; }
          [ -n "$DMG" ] || { echo "::error::dmg artifact not found for ${VERSION}"; exit 1; }
          # Ed25519 -rawin requires openssl >= 3.x — assert, don't just print.
          ver=$(openssl version | awk '{print $2}')
          case "$ver" in 3.*|4.*|5.*) echo "openssl $ver OK" ;; *) echo "::error::openssl $ver too old (need >= 3.x for Ed25519 -rawin)"; exit 1 ;; esac
          python3 scripts/verify_update_signatures.py \
            --appcast appcast.xml \
            --windows-installer "$WIN" \
            --macos-dmg "$DMG" \
            --autoupdater-src cef-native/src/core/AutoUpdater.cpp \
            --info-plist cef-native/Info.plist

      # ===================================================================
      # END OF THE AUTOMATED PATH — the verified DRAFT is the finish line.
      #
      # Promotion to public (flip to Latest + website appcast update) is a
      # SEPARATE, MANUALLY-triggered workflow: .github/workflows/promote.yml
      # (workflow_dispatch). The owner runs it only AFTER installing and
      # testing THIS exact draft artifact on real hardware.
      #
      # Why split: a tag push must NEVER reach a customer on its own. The
      # earlier "Promote release to live" + "Update website" steps used to run
      # here automatically; they were moved to promote.yml so that nothing is
      # public until a human has tested the build. This is the
      # "test-before-customers" gate. (Auto-promote removed 2026-06-26.)
      # ===================================================================
      - name: Draft ready — awaiting manual promote
        run: |
          echo "Draft release ${GITHUB_REF_NAME} built, signed, and crypto-verified."
          echo ""
          echo "It is NOT public and is NOT marked Latest."
          echo ""
          echo "To ship it:"
          echo "  1. Download the draft assets and TEST the build on real hardware"
          echo "     (install, launch, run the N-1 -> N update + relaunch, multi-profile,"
          echo "      wallet loads)."
          echo "  2. Run the 'Promote release' workflow (Actions -> Promote release ->"
          echo "     Run workflow) with tag=${GITHUB_REF_NAME}."
          echo ""
          echo "The promote workflow re-downloads these published draft bytes,"
          echo "re-verifies their signatures, then flips to Latest and updates the website."
