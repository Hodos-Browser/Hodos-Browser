# Hodos Browser Release Workflow
# 
# Triggers when you push a version tag (e.g., v1.0.0)
# Builds installers for Windows (macOS coming later), signs them, publishes to GitHub Releases
#
# SETUP REQUIRED:
#
# 1. Upload CEF binaries to a GitHub Release:
#    - Create a release tagged "cef-binaries" in this repo
#    - Upload cef-binaries-windows.zip (your built-from-source Windows CEF)
#    - Later: upload cef-binaries-macos.zip
#
# 2. Add these secrets (GitHub org → Settings → Secrets):
#    Azure Trusted Signing (Windows):
#      - AZURE_TENANT_ID
#      - AZURE_CLIENT_ID  
#      - AZURE_CLIENT_SECRET
#
#    Apple (macOS - add later):
#      - MACOS_CERT_BASE64
#      - MACOS_CERT_PASSWORD
#      - APPLE_TEAM_ID
#      - APPLE_API_KEY_ID
#      - APPLE_API_ISSUER
#      - APPLE_API_KEY_P8_BASE64

name: Release

on:
  push:
    tags:
      - 'v*'  # Triggers on v1.0.0, v2.1.3, etc.

env:
  # Azure Artifact Signing config
  AZURE_SIGNING_ENDPOINT: https://wcus.codesigning.azure.net/
  AZURE_SIGNING_ACCOUNT: Hodos-Signing
  AZURE_SIGNING_PROFILE: Hodos-signing

jobs:
  # ============================================================
  # WINDOWS BUILD
  # ============================================================
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      # Get version from tag (strips 'v' prefix)
      - name: Get version from tag
        id: version
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          echo "Building version: $version"
      
      # Download CEF binaries from the cef-binaries release
      - name: Download CEF binaries
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download cef-binaries --pattern "cef-binaries-windows.zip" --repo ${{ github.repository }}

          echo "Extracting CEF binaries..."
          7z x cef-binaries-windows.zip -y
          del cef-binaries-windows.zip

          if (Test-Path "cef-binaries") {
            echo "CEF binaries extracted successfully"
            dir cef-binaries
          } else {
            echo "ERROR: cef-binaries folder not found after extraction"
            exit 1
          }
        shell: pwsh
      
      # Set up build tools
      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
      
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
      
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            rust-wallet
            adblock-engine
      
      # Install Inno Setup
      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
      
      # Install C++ dependencies via vcpkg
      - name: Install vcpkg dependencies
        shell: pwsh
        run: |
          vcpkg install nlohmann-json:x64-windows-static sqlite3:x64-windows-static

      # Download WinSparkle for auto-update support
      - name: Download WinSparkle
        shell: pwsh
        run: |
          New-Item -Path "external\winsparkle" -ItemType Directory -Force
          Invoke-WebRequest -Uri "https://github.com/vslavik/winsparkle/releases/download/v0.8.1/WinSparkle-0.8.1.zip" -OutFile "external\winsparkle\WinSparkle.zip"
          Expand-Archive "external\winsparkle\WinSparkle.zip" -DestinationPath "external\winsparkle"

      # Configure CMake (needed before build script)
      - name: Configure CMake
        shell: pwsh
        run: |
          cd cef-native
          cmake -B build -G "Visual Studio 17 2022" -A x64 -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"
      
      # Run the existing build script (created by your dev)
      - name: Build with release script
        shell: pwsh
        run: |
          .\scripts\build-release.ps1 -Version "${{ steps.version.outputs.VERSION }}"
      
      # Sign all executables with Azure Trusted Signing
      - name: Sign executables with Azure Trusted Signing
        uses: azure/trusted-signing-action@v1.2.0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ env.AZURE_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ env.AZURE_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ env.AZURE_SIGNING_PROFILE }}
          files-folder: ${{ github.workspace }}/staging/HodosBrowser
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256
      
      # Re-run installer after signing (so installer contains signed exes)
      - name: Rebuild installer with signed executables
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          $version = "${{ steps.version.outputs.VERSION }}"
          & $iscc "/DAppVersion=$version" "/DProjectRoot=${{ github.workspace }}" "/DStagingDir=${{ github.workspace }}\staging\HodosBrowser" "/DDistDir=${{ github.workspace }}\dist" "installer\hodos-browser.iss"
      
      # Sign the final installer
      - name: Sign installer with Azure Trusted Signing
        uses: azure/trusted-signing-action@v1.2.0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ env.AZURE_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ env.AZURE_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ env.AZURE_SIGNING_PROFILE }}
          files-folder: ${{ github.workspace }}/dist
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256
      
      # Upload for publish job
      - name: Upload Windows installer
        uses: actions/upload-artifact@v7
        with:
          name: windows-installer
          path: dist/*.exe
          if-no-files-found: error
      
      - name: Upload Windows portable zip
        uses: actions/upload-artifact@v7
        with:
          name: windows-portable
          path: dist/*.zip
          if-no-files-found: error

  # ============================================================
  # MACOS BUILD
  # ============================================================
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Get version from tag
        id: version
        run: |
          version="${GITHUB_REF_NAME#v}"
          echo "VERSION=$version" >> $GITHUB_OUTPUT
          echo "Building version: $version"

      # Download CEF binaries
      - name: Download CEF binaries
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download cef-binaries --pattern "cef-binaries-macos.tar.bz2" --repo ${{ github.repository }}

          echo "Extracting CEF binaries..."
          tar -xjf cef-binaries-macos.tar.bz2
          rm cef-binaries-macos.tar.bz2

          # Handle nested directory — find and rename to cef-binaries
          if [ ! -d "cef-binaries" ]; then
            extracted=$(find . -maxdepth 1 -type d -name "cef_binary*" -o -name "cef-binaries*" | head -1)
            if [ -n "$extracted" ]; then
              mv "$extracted" cef-binaries
            else
              echo "ERROR: Could not find extracted CEF directory"
              ls -la
              exit 1
            fi
          fi

          echo "CEF binaries extracted:"
          ls cef-binaries/

      # Build CEF wrapper if not pre-built
      - name: Build CEF wrapper
        run: |
          cd cef-binaries
          if [ ! -f "build/libcef_dll_wrapper/libcef_dll_wrapper.a" ]; then
            echo "Building CEF wrapper..."
            mkdir -p build && cd build
            cmake .. -DCMAKE_BUILD_TYPE=Release
            cmake --build . --target libcef_dll_wrapper --config Release
          else
            echo "CEF wrapper already built"
          fi

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            rust-wallet
            adblock-engine

      # Install C++ dependencies
      - name: Install macOS dependencies
        run: |
          brew install openssl nlohmann-json sqlite3

      # Build Rust wallet
      - name: Build Rust wallet
        run: |
          cd rust-wallet
          cargo build --release

      # Build adblock engine
      - name: Build adblock engine
        run: |
          cd adblock-engine
          cargo build --release

      # Build frontend
      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      # Download Sparkle 2 framework for auto-updates
      - name: Download Sparkle 2
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Downloading Sparkle 2.9.0..."
          gh release download 2.9.0 --repo sparkle-project/Sparkle --pattern "Sparkle-*.tar.xz" --output Sparkle.tar.xz
          mkdir -p sparkle-extract
          tar -xf Sparkle.tar.xz -C sparkle-extract
          ls -la sparkle-extract/
          # Copy framework to expected location
          mkdir -p external
          cp -r sparkle-extract/Sparkle.framework external/Sparkle.framework
          echo "Sparkle 2 framework installed:"
          ls -la external/Sparkle.framework/

      # Build CEF shell
      - name: Configure and build CEF shell
        run: |
          cd cef-native
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release

          cd build/bin

          echo "=== Full app bundle structure ==="
          find HodosBrowserShell.app -type d | head -40

          # Fix double-nested Contents/Contents issue from CMake
          if [ -d "HodosBrowserShell.app/Contents/Contents" ]; then
            echo "Found double-nested Contents — fixing..."
            # Move everything from Contents/Contents/Frameworks to Contents/Frameworks
            if [ -d "HodosBrowserShell.app/Contents/Contents/Frameworks" ]; then
              mkdir -p "HodosBrowserShell.app/Contents/Frameworks"
              cp -r HodosBrowserShell.app/Contents/Contents/Frameworks/* "HodosBrowserShell.app/Contents/Frameworks/" 2>/dev/null || true
              rm -rf "HodosBrowserShell.app/Contents/Contents"
            fi
          fi

          # Also copy standalone helpers from build/bin into Frameworks
          for helper in "HodosBrowser Helper"*.app; do
            if [ -d "$helper" ] && [[ "$helper" != *"HodosBrowserShell.app"* ]]; then
              echo "Copying standalone helper: $helper"
              cp -r "$helper" "HodosBrowserShell.app/Contents/Frameworks/"
            fi
          done

          echo "=== Fixed Frameworks contents ==="
          ls -la "HodosBrowserShell.app/Contents/Frameworks/" 2>/dev/null || echo "No Frameworks dir"
          echo "=== Verify no double Contents ==="
          find HodosBrowserShell.app -path "*/Contents/Contents*" -type d | head -5 || echo "Clean — no double nesting"

      # Copy Rust binaries and frontend into app bundle
      - name: Assemble app bundle
        run: |
          APP="cef-native/build/bin/HodosBrowserShell.app/Contents"

          # Copy Rust binaries into MacOS/
          cp rust-wallet/target/release/hodos-wallet "$APP/MacOS/"
          cp adblock-engine/target/release/hodos-adblock "$APP/MacOS/"

          # Copy frontend into Resources/frontend/
          mkdir -p "$APP/Resources/frontend"
          cp -r frontend/dist/* "$APP/Resources/frontend/"

          # Copy Sparkle.framework into app bundle Frameworks/
          # Use ditto to preserve macOS framework symlink structure.
          # Sparkle ships pre-signed by the Sparkle project — we do NOT re-sign it.
          if [ -d "external/Sparkle.framework" ]; then
            ditto external/Sparkle.framework "$APP/Frameworks/Sparkle.framework"
            echo "Sparkle.framework copied to app bundle (pre-signed, not re-signed)"
          fi

          # Verify helper location (must be Contents/Frameworks, not Contents/Contents/Frameworks)
          echo "App bundle structure:"
          find "cef-native/build/bin/HodosBrowserShell.app" -maxdepth 4 -type d | head -30

      # Import signing certificate
      - name: Import code signing certificate
        env:
          MACOS_CERT_BASE64: ${{ secrets.MACOS_CERT_BASE64 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          # Create temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          echo "$MACOS_CERT_BASE64" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 -P "$MACOS_CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          # Find signing identity
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      # Sign the app bundle
      - name: Sign app bundle
        run: |
          APP="cef-native/build/bin/HodosBrowserShell.app"
          ENTITLEMENTS="cef-native/mac/entitlements.plist"
          # Fix Windows CRLF line endings that break codesign plist parsing
          sed -i '' 's/\r$//' "$ENTITLEMENTS"
          IDENTITY="Developer ID Application: Matthew Archbold"
          CODESIGN="codesign --force --timestamp --options runtime --sign"

          # 1. Sign all dylibs inside CEF framework individually
          find "$APP/Contents/Frameworks/Chromium Embedded Framework.framework" -name "*.dylib" -type f | while read dylib; do
            echo "Signing dylib: $dylib"
            $CODESIGN "$IDENTITY" "$dylib"
          done

          # 2. Sign the CEF framework itself
          $CODESIGN "$IDENTITY" --entitlements "$ENTITLEMENTS" \
            "$APP/Contents/Frameworks/Chromium Embedded Framework.framework"

          # 3. Sign each helper — executable first, then bundle
          for helper in "$APP/Contents/Frameworks/HodosBrowser Helper"*.app; do
            if [ -d "$helper" ]; then
              helper_exec="$helper/Contents/MacOS/$(basename "$helper" .app)"
              if [ -f "$helper_exec" ]; then
                echo "Signing helper exec: $helper_exec"
                $CODESIGN "$IDENTITY" --entitlements "$ENTITLEMENTS" "$helper_exec"
              fi
              echo "Signing helper bundle: $helper"
              $CODESIGN "$IDENTITY" --entitlements "$ENTITLEMENTS" "$helper"
            fi
          done

          # 4. Sign Rust binaries
          $CODESIGN "$IDENTITY" "$APP/Contents/MacOS/hodos-wallet"
          $CODESIGN "$IDENTITY" "$APP/Contents/MacOS/hodos-adblock"

          # 5. Sign main executable
          $CODESIGN "$IDENTITY" --entitlements "$ENTITLEMENTS" "$APP/Contents/MacOS/HodosBrowserShell"

          # 6. Sign the whole bundle
          # Temporarily move Sparkle out so --force doesn't try to re-sign it,
          # then move it back after signing. Sparkle keeps its original signature.
          SPARKLE_TMP=""
          if [ -d "$APP/Contents/Frameworks/Sparkle.framework" ]; then
            SPARKLE_TMP="$(mktemp -d)/Sparkle.framework"
            mv "$APP/Contents/Frameworks/Sparkle.framework" "$SPARKLE_TMP"
          fi

          $CODESIGN "$IDENTITY" --entitlements "$ENTITLEMENTS" "$APP"

          if [ -n "$SPARKLE_TMP" ] && [ -d "$SPARKLE_TMP" ]; then
            mv "$SPARKLE_TMP" "$APP/Contents/Frameworks/Sparkle.framework"
          fi

          # 7. Verify our components (Sparkle has its own valid signature)
          codesign --verify --verbose=2 "$APP" || echo "WARNING: verify had issues"

      # Notarize
      - name: Notarize app
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
        run: |
          APP="cef-native/build/bin/HodosBrowserShell.app"

          # Write API key
          mkdir -p ~/private_keys
          echo "$APPLE_API_KEY_P8_BASE64" | base64 --decode > ~/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8

          # Create zip for notarization
          ditto -c -k --keepParent "$APP" HodosBrowser-notarize.zip

          # Submit for notarization (don't block on it — Apple can be very slow)
          xcrun notarytool submit HodosBrowser-notarize.zip \
            --key ~/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8 \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER" \
            --wait --timeout 3600 2>&1 || echo "Notarization timed out or failed — continuing with signed-only build"

          # Try to staple (works if notarization completed, no-op if not)
          xcrun stapler staple "$APP" 2>/dev/null || echo "Stapling skipped — notarization may still be processing"

          rm -f HodosBrowser-notarize.zip

      # Create DMG
      - name: Create DMG
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          APP="cef-native/build/bin/HodosBrowserShell.app"

          mkdir -p dist
          hdiutil create -volname "HodosBrowser" -srcfolder "$APP" -ov -format UDZO "dist/HodosBrowser-${VERSION}.dmg"

          # Sign the DMG too
          codesign --force --sign "Developer ID Application: Matthew Archbold" "dist/HodosBrowser-${VERSION}.dmg"

      # Upload
      - name: Upload macOS DMG
        uses: actions/upload-artifact@v7
        with:
          name: macos-dmg
          path: dist/*.dmg
          if-no-files-found: error

  # ============================================================
  # PUBLISH RELEASE
  # ============================================================
  publish:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed to create releases

    steps:
      - name: Checkout code (for appcast script)
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: List artifacts
        run: |
          echo "Downloaded artifacts:"
          find artifacts -type f

      - name: Generate checksums
        run: |
          cd artifacts
          find . -type f \( -name "*.exe" -o -name "*.zip" -o -name "*.dmg" \) -exec sha256sum {} \; > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Generate appcast.xml
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          REPO_URL="https://github.com/${{ github.repository }}/releases/download/${GITHUB_REF_NAME}"

          ls -la artifacts/ || true
          ls -la artifacts/*/ || true

          # Get file sizes
          WIN_SIZE=$(find artifacts -name "HodosBrowser-${VERSION}-setup.exe" -exec stat -c%s {} \; 2>/dev/null | head -1)
          MAC_SIZE=$(find artifacts -name "HodosBrowser-${VERSION}.dmg" -exec stat -c%s {} \; 2>/dev/null | head -1)
          WIN_SIZE=${WIN_SIZE:-0}
          MAC_SIZE=${MAC_SIZE:-0}

          python3 scripts/generate-appcast.py \
            --version "$VERSION" \
            --windows-url "${REPO_URL}/HodosBrowser-${VERSION}-setup.exe" \
            --windows-size "$WIN_SIZE" \
            --macos-url "${REPO_URL}/HodosBrowser-${VERSION}.dmg" \
            --macos-size "$MAC_SIZE" \
            --output appcast.xml

          cat appcast.xml
          cp appcast.xml artifacts/appcast.xml || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true  # Creates as draft - you review before publishing
          generate_release_notes: true
          files: |
            artifacts/windows-installer/*
            artifacts/windows-portable/*
            artifacts/macos-dmg/*
            artifacts/appcast.xml
            artifacts/SHA256SUMS.txt

      # Push appcast.xml to website repo for auto-update discovery
      - name: Push appcast to website
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository_owner }}/hodosbrowser.com.git website-repo
          cp appcast.xml website-repo/public/appcast.xml 2>/dev/null || \
          cp appcast.xml website-repo/static/appcast.xml 2>/dev/null || \
          cp appcast.xml website-repo/src/pages/appcast.xml 2>/dev/null || \
          cp appcast.xml website-repo/appcast.xml
          cd website-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Update appcast.xml for ${GITHUB_REF_NAME}"
          git push || echo "WARNING: Could not push appcast to website repo (check permissions)"
